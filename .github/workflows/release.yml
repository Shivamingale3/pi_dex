name: release

on:
  push:
    tags: ["v*"]

jobs:
  build:
    name: build-${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-24.04
          - arch: arm64
            runner: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt pyinstaller
      - run: pyinstaller pidex.spec --noconfirm
      - run: mv dist/pidex dist/pidex-${{ github.ref_name }}-linux-${{ matrix.arch }}
      - uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.arch }}
          path: dist/pidex-${{ github.ref_name }}-linux-${{ matrix.arch }}

  release:
    needs: build
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/download-artifact@v4
        with:
          pattern: binary-*
          merge-multiple: true
      - name: Generate SHA256SUMS
        run: sha256sum pidex-* > SHA256SUMS
      - name: Generate changelog
        uses: orhun/git-cliff-action@v4
        id: git-cliff
        with:
          config: cliff.toml
          args: --latest --strip header
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          body: ${{ steps.git-cliff.outputs.content }}
          files: |
            pidex-${{ github.ref_name }}-linux-amd64
            pidex-${{ github.ref_name }}-linux-arm64
            SHA256SUMS
